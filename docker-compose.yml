version: '3.8'

services:
  # 1. DATABASE MICROSERVICE
  postgres-db:
    build: 
      context: ./database/postgres
    container_name: mylaw-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mylaw_local_password
      POSTGRES_DB: mylaw_auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 2. BACKEND MICROSERVICE
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: mylaw-auth-service
    restart: always
    depends_on:
      - postgres-db
    ports:
      - "8000:8080" # Local machine port 8000 routes to Node port 8080
    environment:
      - PORT=8080
      - FRONTEND_URL=http://localhost:9090
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mylaw_local_password
      - DB_NAME=mylaw_auth_db
      - JWT_SECRET=mylaw_super_secret_local_dev_key_2026
      - JWT_EXPIRES_IN=24h

  # 3. FRONTEND MICROSERVICE
  frontend:
    build:
      context: ./frontend
    container_name: mylaw-app
    restart: always
    depends_on:
      - auth-service
    ports:
      - "9090:80"

volumes:
  postgres-data: